bundle:
  name: dab_project
  uuid: d74401f5-18f4-4914-be93-b85151271f9c

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  user:
    description: "Usuário do deploy"

targets:
  dev:
    mode: production
    default: true

    workspace:
      host: https://dbc-98593ae9-08e1.cloud.databricks.com
      root_path: /Workspace/Shared/DEV/${bundle.name}/${bundle.target}

    presets:
      artifacts_dynamic_version: true
      name_prefix: "[DEV ${var.user}] "

  prod:
    mode: production

    workspace:
      host: https://dbc-98593ae9-08e1.cloud.databricks.com
      root_path: /Workspace/Shared/PROD/.bundle/${bundle.name}/${bundle.target}

    permissions:
      - user_name: bru.peixoto@hotmail.com
        level: CAN_MANAGE