# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: d74401f5-18f4-4914-be93-b85151271f9c

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  user:
    description: "Usuário que está fazendo o deploy"
    default: ${var.user}

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: production
    default: true
    workspace:
      host: https://dbc-98593ae9-08e1.cloud.databricks.com
      root_path: /Workspace/Shared/DEV/${bundle.name}/${bundle.target}

    presets:
      # Set dynamic_version: true on all artifacts of type "whl".
      # This makes "bundle deploy" add a timestamp to wheel's version before uploading,
      # new wheel takes over the previous installation even if actual wheel version is unchanged.
      # See https://docs.databricks.com/aws/en/dev-tools/bundles/settings
      artifacts_dynamic_version: true
      name_prefix: "[DEV gitactions ${var.user}] "

  prod:
    mode: production
    workspace:
      host: https://dbc-98593ae9-08e1.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/bru.peixoto@hotmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/PROD/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: bru.peixoto@hotmail.com
        level: CAN_MANAGE
