# This is a Databricks asset bundle definition for dab_git.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_git
  uuid: bc2d40da-7050-4e56-9b19-3d74045993b2

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-98593ae9-08e1.cloud.databricks.com
    variables:
      catalog: workspace
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-98593ae9-08e1.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/bru.peixoto@hotmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/bru.peixoto@hotmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: bru.peixoto@hotmail.com
        level: CAN_MANAGE
